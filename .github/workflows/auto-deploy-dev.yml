name: Auto Deploy Dev

on:
  push:
    branches:
      - dev

concurrency:
  group: auto-deploy-dev
  cancel-in-progress: false

env:
  REPO_NAME: a2me-mcp-server

jobs:
  auto-tag-and-deploy:
    name: Auto Tag & Deploy to Dev
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST_TAG=$(git tag --list 'dev-v*' --sort=-version:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="0.0.1"
          else
            VERSION=${LATEST_TAG#dev-v}
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          NEXT_TAG="dev-v${NEXT_VERSION}"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "📦 Next version: $NEXT_VERSION (tag: $NEXT_TAG)"

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Auto-release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: true
          generate_release_notes: true

      - name: Trigger deployment
        env:
          GH_TOKEN: ${{ secrets.WORKFLOWS_DISPATCH_TOKEN }}
        run: |
          echo "🚀 Triggering deployment of ${{ env.REPO_NAME }} @ ${{ steps.version.outputs.tag }} to dev..."
          gh workflow run deploy-service.yml \
            --repo Kinnectd/kinnectd-workflows \
            --ref main \
            -f repo=${{ env.REPO_NAME }} \
            -f tag=${{ steps.version.outputs.tag }} \
            -f environment=dev \
            -f core-version=
          echo "✅ Deployment triggered. Monitor: https://github.com/Kinnectd/kinnectd-workflows/actions"
