name: Build and Test

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

  deploy-dev:
    needs: build
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/ci-trigger-cloudbuild.yml
    secrets: inherit

  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/ci-trigger-cloudbuild-prod.yml
    secrets: inherit
