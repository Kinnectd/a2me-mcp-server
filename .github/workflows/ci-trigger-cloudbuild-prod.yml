name: Trigger GCP Cloud Build to Production

on: [workflow_call, workflow_dispatch]

permissions:
  contents: read
  id-token: write

jobs:
  cloud-build:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_ACTIONS_PROD_DEPLOYER_KEY }}

      - name: Install Cloud SDK (gcloud)
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.PROD_GCP_PROJECT_ID }}

      # NOTE: prod uses a *separate* Scalekit "Kinnectd Prod" environment that hasn't been created
      # yet — register an a2me-mcp-server resource there and replace _MCP_AUTH_ISSUER below before
      # the first prod release. The audience/public URL is mcp.a2me.app.
      - name: Trigger Cloud Build
        run: |
          gcloud builds submit \
            --project="${{ secrets.PROD_GCP_PROJECT_ID }}" \
            --region="us-central1" \
            --config="cloudbuild.yml" \
            --substitutions="_SERVICE_NAME=${{ github.event.repository.name }},_DEPLOY_REGION=us-central1,_AR_PROJECT_ID=${{ secrets.PROD_GCP_PROJECT_ID }},_AR_HOSTNAME=us-central1-docker.pkg.dev,_AR_REPOSITORY=cloud-run-source-deploy,REPO_NAME=${{ github.event.repository.name }},COMMIT_SHA=${{ github.sha }},_MCP_AUTH_ISSUER=TODO_PROD_SCALEKIT_ISSUER,_MCP_PUBLIC_URL=https://mcp.a2me.app,_A2ME_API_URL=https://api.kinnectd.com/api" \
            .
